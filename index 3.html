<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="FinanceOS" />
  <meta name="theme-color" content="#070d1a" />
  <title>FinanceOS</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    html,body{background:#070d1a;height:100%;}
    #root{min-height:100vh;}
    #loading{position:fixed;inset:0;background:#070d1a;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:#00d4aa;font-family:sans-serif;z-index:9999;}
    #loading .logo{font-size:1.4rem;font-weight:800;letter-spacing:-.02em;}
    #loading .logo span{color:#e2e8f0;opacity:.6;}
    #loading .dot{width:8px;height:8px;border-radius:50%;background:#00d4aa;animation:pulse 1s ease-in-out infinite;}
    @keyframes pulse{0%,100%{opacity:.3;transform:scale(.8);}50%{opacity:1;transform:scale(1.1);}}
  </style>
  <script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/recharts@2.8.0/umd/Recharts.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.23.2/babel.min.js"></script>
</head>
<body>
  <div id="loading">
    <div class="logo">Finance<span>OS</span></div>
    <div class="dot"></div>
  </div>
  <div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useMemo } = React;
const { BarChart, Bar, XAxis, YAxis, Tooltip, ResponsiveContainer, PieChart, Pie, Cell } = Recharts;

// ═══════════════════════════════════════════════════════
// CONSTANTS & HELPERS
// ═══════════════════════════════════════════════════════
const STORAGE_KEY = "financeOS_v1";
const MONTHS_PT = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
const CATEGORIES = ["Moradia","Alimentação","Transporte","Saúde","Educação","Lazer","Vestuário","Serviços","Assinaturas","Investimentos","Outros"];
const CARD_COLORS = ["#00d4aa","#6366f1","#f59e0b","#ef4444","#8b5cf6","#ec4899","#06b6d4","#f97316","#84cc16","#a78bfa"];
const CAT_COLORS  = ["#00d4aa","#6366f1","#f59e0b","#ef4444","#8b5cf6","#ec4899","#06b6d4","#f97316","#84cc16","#a78bfa","#64748b"];

const T = {
  bg:"#070d1a", surface:"#0d1525", surface2:"#131e30", surface3:"#192538",
  border:"#1e2d45", accent:"#00d4aa", accentDim:"#00d4aa18",
  positive:"#22c55e", negative:"#ef4444", warn:"#f59e0b",
  text:"#e2e8f0", muted:"#4a6080", dim:"#2a3f58",
};

const uid      = () => Math.random().toString(36).substr(2,9);
const fmt      = v  => new Intl.NumberFormat("pt-BR",{style:"currency",currency:"BRL"}).format(v||0);
const calcPct  = (a,b) => b>0 ? Math.min(100,(a/b)*100) : 0;
const curMonth = () => { const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`; };
const parseMo  = m  => { const [y,mo]=m.split("-"); return {year:+y,month:+mo-1}; };
const moLabel  = m  => { const {year,month}=parseMo(m); return `${MONTHS_PT[month]} ${year}`; };
const prevMo   = m  => { const {year,month}=parseMo(m); const d=new Date(year,month-1,1); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`; };
const nextMo   = m  => { const {year,month}=parseMo(m); const d=new Date(year,month+1,1); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`; };

function loadState() {
  try { const r=localStorage.getItem(STORAGE_KEY); return r?JSON.parse(r):{cards:[],months:{}}; }
  catch { return {cards:[],months:{}}; }
}
function emptyMonth() { return {income:[],expenses:[],cardBalances:{}}; }
function getMo(state,m) { return state.months[m]||emptyMonth(); }

// ═══════════════════════════════════════════════════════
// SHARED UI PRIMITIVES
// ═══════════════════════════════════════════════════════
const iS = {
  width:"100%", padding:"0.6rem 0.8rem",
  background:T.surface2, border:`1px solid ${T.border}`,
  borderRadius:8, color:T.text, fontSize:"0.95rem",
  outline:"none", boxSizing:"border-box",
};
const btnP = { background:T.accent, color:T.bg, padding:"0.65rem 1.25rem", border:"none", borderRadius:8, fontWeight:700, cursor:"pointer", fontSize:"0.9rem", width:"100%", marginTop:"0.5rem" };
const btnD = { background:"#ef444422", color:T.negative, padding:"0.55rem 1rem", border:`1px solid #ef444444`, borderRadius:8, fontWeight:600, cursor:"pointer", fontSize:"0.85rem", width:"100%", marginTop:"0.5rem" };

function Modal({title,onClose,children}) {
  return (
    <div onClick={e=>e.target===e.currentTarget&&onClose()} style={{position:"fixed",inset:0,background:"rgba(0,0,0,.85)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:"1rem"}}>
      <div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:14,width:"100%",maxWidth:460,maxHeight:"90vh",overflow:"auto"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"1.1rem 1.4rem",borderBottom:`1px solid ${T.border}`}}>
          <span style={{fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:"1.05rem",color:T.text}}>{title}</span>
          <button onClick={onClose} style={{background:"none",border:"none",color:T.muted,cursor:"pointer",fontSize:"1.5rem",lineHeight:1}}>×</button>
        </div>
        <div style={{padding:"1.4rem"}}>{children}</div>
      </div>
    </div>
  );
}

function Field({label,children}) {
  return (
    <div style={{marginBottom:"0.9rem"}}>
      <label style={{display:"block",marginBottom:4,fontSize:".75rem",fontWeight:700,color:T.muted,textTransform:"uppercase",letterSpacing:".06em"}}>{label}</label>
      {children}
    </div>
  );
}

function SectionHeader({title,sub,onAdd}) {
  return (
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"1rem"}}>
      <div>
        <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:"1.25rem",color:T.text}}>{title}</div>
        {sub&&<div style={{fontSize:".78rem",color:T.muted,marginTop:1}}>{sub}</div>}
      </div>
      <button onClick={onAdd} style={{background:T.accent,color:T.bg,border:"none",borderRadius:8,width:34,height:34,fontSize:"1.4rem",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,lineHeight:1}}>+</button>
    </div>
  );
}

function Empty({text}) {
  return <div style={{textAlign:"center",padding:"2.5rem 1rem",color:T.muted}}><div style={{fontSize:"1.8rem",opacity:.35,marginBottom:8}}>◈</div><div style={{fontSize:".88rem"}}>{text}</div></div>;
}

function Badge({label,color,bg}) {
  return <span style={{fontSize:".62rem",padding:"1px 7px",borderRadius:99,fontWeight:700,background:bg,color:color}}>{label}</span>;
}

const KPI = ({label,value,accent,icon}) => (
  <div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:12,padding:".875rem"}}>
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6}}>
      <span style={{fontSize:".68rem",fontWeight:700,color:T.muted,textTransform:"uppercase",letterSpacing:".05em"}}>{label}</span>
      <span style={{color:accent,opacity:.55,fontSize:"1rem"}}>{icon}</span>
    </div>
    <span style={{fontFamily:"'JetBrains Mono',monospace",fontWeight:700,fontSize:".98rem",color:accent}}>{value}</span>
  </div>
);

const Card = ({children,style}) => <div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:12,padding:"1rem",...style}}>{children}</div>;
const RowBetween = ({children,style}) => <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",...style}}>{children}</div>;
const Mono = ({children,style}) => <span style={{fontFamily:"'JetBrains Mono',monospace",fontWeight:600,...style}}>{children}</span>;
const Label = ({children,style}) => <div style={{fontSize:".75rem",fontWeight:700,color:T.muted,textTransform:"uppercase",letterSpacing:".06em",...style}}>{children}</div>;

// ═══════════════════════════════════════════════════════
// ROOT APP
// ═══════════════════════════════════════════════════════
function App() {
  const [state,  setState]  = useState(loadState);
  const [month,  setMonth]  = useState(curMonth);
  const [tab,    setTab]    = useState("dashboard");
  const [modal,  setModal]  = useState(null);

  useEffect(()=>{ localStorage.setItem(STORAGE_KEY,JSON.stringify(state)); },[state]);

  // Hide loading screen
  useEffect(()=>{ const el=document.getElementById("loading"); if(el) el.style.display="none"; },[]);

  const mo = getMo(state,month);

  const upMo = (m,fn) => setState(s=>({...s,months:{...s.months,[m]:fn(getMo(s,m))}}));

  const addIncome   = d    => upMo(month,mo=>({...mo,income:[...mo.income,{...d,id:uid()}]}));
  const editIncome  = (id,d)=> upMo(month,mo=>({...mo,income:mo.income.map(i=>i.id===id?{...i,...d}:i)}));
  const delIncome   = id   => upMo(month,mo=>({...mo,income:mo.income.filter(i=>i.id!==id)}));

  const addCard     = d    => setState(s=>({...s,cards:[...s.cards,{...d,id:uid()}]}));
  const editCard    = (id,d)=> setState(s=>({...s,cards:s.cards.map(c=>c.id===id?{...c,...d}:c)}));
  const delCard     = id   => setState(s=>({...s,cards:s.cards.filter(c=>c.id!==id)}));
  const setCardBal  = (cid,v) => upMo(month,mo=>({...mo,cardBalances:{...mo.cardBalances,[cid]:+v}}));

  const addExpense  = d    => upMo(month,mo=>({...mo,expenses:[...mo.expenses,{...d,id:uid(),paid:false}]}));
  const editExpense = (id,d)=> upMo(month,mo=>({...mo,expenses:mo.expenses.map(e=>e.id===id?{...e,...d}:e)}));
  const delExpense  = id   => upMo(month,mo=>({...mo,expenses:mo.expenses.filter(e=>e.id!==id)}));
  const togglePaid  = id   => upMo(month,mo=>({...mo,expenses:mo.expenses.map(e=>e.id===id?{...e,paid:!e.paid}:e)}));

  const copyFixed = () => {
    const prev  = prevMo(month);
    const fixed = (state.months[prev]?.expenses||[]).filter(e=>e.type==="fixed");
    upMo(month,mo=>({...mo,expenses:[...mo.expenses,...fixed.map(e=>({...e,id:uid(),paid:false}))]}));
  };
  const hasPrevFixed = () => (state.months[prevMo(month)]?.expenses||[]).some(e=>e.type==="fixed");

  const C = useMemo(()=>{
    const totalIncome   = mo.income.reduce((s,i)=>s+(+i.amount||0),0);
    const totalExpenses = mo.expenses.reduce((s,e)=>s+(+e.amount||0),0);
    const paidAmt       = mo.expenses.filter(e=>e.paid).reduce((s,e)=>s+(+e.amount||0),0);
    const unpaidAmt     = totalExpenses-paidAmt;
    const balance       = totalIncome-paidAmt;
    const projected     = totalIncome-totalExpenses;
    const fixedTotal    = mo.expenses.filter(e=>e.type==="fixed").reduce((s,e)=>s+(+e.amount||0),0);
    const variableTotal = mo.expenses.filter(e=>e.type==="variable").reduce((s,e)=>s+(+e.amount||0),0);

    const cardBals = {};
    state.cards.forEach(card=>{
      const init  = mo.cardBalances[card.id]!==undefined?+mo.cardBalances[card.id]:0;
      const spent = mo.expenses.filter(e=>e.paid&&e.cardId===card.id).reduce((s,e)=>s+(+e.amount||0),0);
      cardBals[card.id] = init-spent;
    });

    const byCat = {};
    mo.expenses.forEach(e=>{
      if(!byCat[e.category]) byCat[e.category]={total:0,paid:0};
      byCat[e.category].total+=+e.amount||0;
      if(e.paid) byCat[e.category].paid+=+e.amount||0;
    });
    const catData = Object.entries(byCat).map(([n,{total,paid}])=>({name:n,total,paid})).sort((a,b)=>b.total-a.total);

    return {totalIncome,totalExpenses,paidAmt,unpaidAmt,balance,projected,fixedTotal,variableTotal,cardBals,catData};
  },[state,month,mo]);

  const tabs = [
    {id:"dashboard",icon:"◈",label:"Dashboard"},
    {id:"income",   icon:"↑", label:"Receitas"},
    {id:"cards",    icon:"▣", label:"Cartões"},
    {id:"expenses", icon:"↓", label:"Despesas"},
  ];

  return (
    <div style={{background:T.bg,minHeight:"100vh",fontFamily:"'DM Sans',sans-serif",color:T.text,paddingBottom:72}}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600&family=JetBrains+Mono:wght@400;600&display=swap');
        *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
        ::-webkit-scrollbar{width:3px;height:3px}
        ::-webkit-scrollbar-track{background:${T.surface}}
        ::-webkit-scrollbar-thumb{background:${T.dim};border-radius:3px}
        input,select{font-family:'DM Sans',sans-serif;}
        input:focus,select:focus{border-color:${T.accent}!important;box-shadow:0 0 0 3px ${T.accent}18}
        input[type=number]::-webkit-inner-spin-button{opacity:.4}
        button:active{opacity:.75;}
      `}</style>

      {/* HEADER */}
      <header style={{background:T.surface,borderBottom:`1px solid ${T.border}`,padding:".8rem 1rem",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:200}}>
        <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:"1.15rem",color:T.accent,letterSpacing:"-.03em"}}>
          Finance<span style={{color:T.text,opacity:.7}}>OS</span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:6}}>
          <button onClick={()=>setMonth(prevMo(month))} style={{background:T.surface2,border:`1px solid ${T.border}`,color:T.text,borderRadius:7,width:30,height:30,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"1.1rem"}}>‹</button>
          <div style={{textAlign:"center",minWidth:130}}>
            <div style={{fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:".92rem"}}>{moLabel(month)}</div>
          </div>
          <button onClick={()=>setMonth(nextMo(month))} style={{background:T.surface2,border:`1px solid ${T.border}`,color:T.text,borderRadius:7,width:30,height:30,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"1.1rem"}}>›</button>
        </div>
      </header>

      {/* CONTENT */}
      <main style={{padding:"1rem",maxWidth:580,margin:"0 auto"}}>
        {tab==="dashboard" && <DashView C={C} state={state} mo={mo} />}
        {tab==="income"    && <IncomeView income={mo.income} C={C} onAdd={()=>setModal({t:"addIncome"})} onEdit={i=>setModal({t:"editIncome",d:i})} />}
        {tab==="cards"     && <CardsView cards={state.cards} mo={mo} C={C} onAddCard={()=>setModal({t:"addCard"})} onEditCard={c=>setModal({t:"editCard",d:c})} onSetBal={setCardBal} />}
        {tab==="expenses"  && <ExpensesView expenses={mo.expenses} cards={state.cards} C={C} onAdd={()=>setModal({t:"addExpense"})} onEdit={e=>setModal({t:"editExpense",d:e})} onToggle={togglePaid} hasPrev={hasPrevFixed()} onCopy={copyFixed} />}
      </main>

      {/* BOTTOM NAV */}
      <nav style={{position:"fixed",bottom:0,left:0,right:0,background:T.surface,borderTop:`1px solid ${T.border}`,display:"flex",zIndex:200}}>
        {tabs.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,padding:".55rem .25rem .45rem",background:"none",border:"none",cursor:"pointer",borderTop:tab===t.id?`2px solid ${T.accent}`:`2px solid transparent`,color:tab===t.id?T.accent:T.muted,transition:"color .15s"}}>
            <div style={{fontSize:"1.15rem",lineHeight:1}}>{t.icon}</div>
            <div style={{fontSize:".6rem",marginTop:2,fontWeight:600}}>{t.label}</div>
          </button>
        ))}
      </nav>

      {/* MODALS */}
      {modal?.t==="addIncome"   && <IncomeModal  onClose={()=>setModal(null)} onSave={d=>{addIncome(d);setModal(null);}} />}
      {modal?.t==="editIncome"  && <IncomeModal  onClose={()=>setModal(null)} onSave={d=>{editIncome(modal.d.id,d);setModal(null);}} init={modal.d} onDel={()=>{delIncome(modal.d.id);setModal(null);}} />}
      {modal?.t==="addCard"     && <CardModal    onClose={()=>setModal(null)} onSave={d=>{addCard(d);setModal(null);}} />}
      {modal?.t==="editCard"    && <CardModal    onClose={()=>setModal(null)} onSave={d=>{editCard(modal.d.id,d);setModal(null);}} init={modal.d} onDel={()=>{delCard(modal.d.id);setModal(null);}} />}
      {modal?.t==="addExpense"  && <ExpenseModal onClose={()=>setModal(null)} onSave={d=>{addExpense(d);setModal(null);}} cards={state.cards} />}
      {modal?.t==="editExpense" && <ExpenseModal onClose={()=>setModal(null)} onSave={d=>{editExpense(modal.d.id,d);setModal(null);}} init={modal.d} cards={state.cards} onDel={()=>{delExpense(modal.d.id);setModal(null);}} />}
    </div>
  );
}

// ═══════════════════════════════════════════════════════
// DASHBOARD
// ═══════════════════════════════════════════════════════
function DashView({C,state,mo}) {
  const {totalIncome,totalExpenses,paidAmt,unpaidAmt,balance,projected,fixedTotal,variableTotal,cardBals,catData} = C;
  const usagePct = calcPct(paidAmt,totalIncome);
  const pieData  = [{name:"Fixas",value:fixedTotal,color:"#6366f1"},{name:"Variáveis",value:variableTotal,color:"#f59e0b"}].filter(d=>d.value>0);
  const pending  = mo.expenses.filter(e=>!e.paid).sort((a,b)=>(a.dueDay||99)-(b.dueDay||99));

  return (
    <div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:".7rem",marginBottom:".8rem"}}>
        <KPI label="Receita Total"   value={fmt(totalIncome)}   accent={T.positive}                              icon="↑"/>
        <KPI label="Total Despesas"  value={fmt(totalExpenses)}  accent={T.negative}                              icon="↓"/>
        <KPI label="Saldo Atual"     value={fmt(balance)}        accent={balance>=0?T.positive:T.negative}        icon="◈"/>
        <KPI label="Projeção Final"  value={fmt(projected)}      accent={projected>=0?T.positive:T.negative}      icon="⟳"/>
      </div>

      <Card style={{marginBottom:".75rem"}}>
        <RowBetween>
          <Label>COMPROMETIMENTO DA RECEITA</Label>
          <Mono style={{color:usagePct>90?T.negative:usagePct>70?T.warn:T.positive}}>{usagePct.toFixed(1)}%</Mono>
        </RowBetween>
        <div style={{height:7,background:T.surface2,borderRadius:99,overflow:"hidden",margin:"8px 0"}}>
          <div style={{height:"100%",width:`${usagePct}%`,background:usagePct>90?T.negative:usagePct>70?T.warn:T.accent,borderRadius:99,transition:"width .5s"}}/>
        </div>
        <RowBetween>
          <span style={{fontSize:".72rem",color:T.muted}}>Pago: {fmt(paidAmt)}</span>
          <span style={{fontSize:".72rem",color:T.muted}}>Pendente: {fmt(unpaidAmt)}</span>
        </RowBetween>
      </Card>

      {catData.length>0 && (
        <Card style={{marginBottom:".75rem"}}>
          <Label style={{marginBottom:12}}>GASTOS POR CATEGORIA</Label>
          <ResponsiveContainer width="100%" height={Math.max(120,catData.length*32)}>
            <BarChart data={catData} layout="vertical" margin={{left:2,right:8,top:0,bottom:0}}>
              <XAxis type="number" hide />
              <YAxis type="category" dataKey="name" tick={{fill:T.text,fontSize:10}} width={88}/>
              <Tooltip formatter={v=>fmt(v)} contentStyle={{background:T.surface3,border:`1px solid ${T.border}`,borderRadius:8,fontSize:12}} labelStyle={{color:T.text}} itemStyle={{color:T.accent}}/>
              <Bar dataKey="total" radius={[0,4,4,0]} name="Total">
                {catData.map((_,i)=><Cell key={i} fill={CAT_COLORS[i%CAT_COLORS.length]+"44"} stroke={CAT_COLORS[i%CAT_COLORS.length]} strokeWidth={1}/>)}
              </Bar>
              <Bar dataKey="paid" radius={[0,4,4,0]} name="Pago">
                {catData.map((_,i)=><Cell key={i} fill={CAT_COLORS[i%CAT_COLORS.length]}/>)}
              </Bar>
            </BarChart>
          </ResponsiveContainer>
          <div style={{display:"flex",gap:12,marginTop:8,justifyContent:"flex-end"}}>
            <div style={{display:"flex",alignItems:"center",gap:5}}><div style={{width:10,height:4,borderRadius:2,background:T.muted,opacity:.5}}/><span style={{fontSize:".7rem",color:T.muted}}>Total</span></div>
            <div style={{display:"flex",alignItems:"center",gap:5}}><div style={{width:10,height:4,borderRadius:2,background:T.accent}}/><span style={{fontSize:".7rem",color:T.muted}}>Pago</span></div>
          </div>
        </Card>
      )}

      {pieData.length>0 && (
        <Card style={{marginBottom:".75rem",display:"flex",alignItems:"center",gap:"1rem"}}>
          <div style={{flexShrink:0}}>
            <PieChart width={90} height={90}>
              <Pie data={pieData} cx={45} cy={45} innerRadius={26} outerRadius={42} dataKey="value" stroke="none">
                {pieData.map((e,i)=><Cell key={i} fill={e.color}/>)}
              </Pie>
            </PieChart>
          </div>
          <div style={{flex:1}}>
            <Label style={{marginBottom:10}}>FIXAS VS VARIÁVEIS</Label>
            {pieData.map((d,i)=>(
              <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                <div style={{display:"flex",alignItems:"center",gap:7}}>
                  <div style={{width:9,height:9,borderRadius:2,background:d.color,flexShrink:0}}/>
                  <span style={{fontSize:".85rem",color:T.text}}>{d.name}</span>
                </div>
                <Mono style={{fontSize:".8rem"}}>{fmt(d.value)}</Mono>
              </div>
            ))}
          </div>
        </Card>
      )}

      {state.cards.length>0 && (
        <Card style={{marginBottom:".75rem"}}>
          <Label style={{marginBottom:12}}>SALDO DOS CARTÕES</Label>
          {state.cards.map(card=>{
            const init  = mo.cardBalances[card.id]!==undefined?+mo.cardBalances[card.id]:0;
            const avail = cardBals[card.id];
            const spent = init-avail;
            const p     = calcPct(spent,init);
            return (
              <div key={card.id} style={{marginBottom:14}}>
                <RowBetween style={{marginBottom:4}}>
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    <div style={{width:9,height:9,borderRadius:2,background:card.color,flexShrink:0}}/>
                    <span style={{fontSize:".9rem",fontWeight:500}}>{card.name}</span>
                    {card.lastDigits&&<span style={{fontSize:".72rem",color:T.muted}}>****{card.lastDigits}</span>}
                  </div>
                  <Mono style={{color:avail>=0?T.positive:T.negative,fontSize:".88rem"}}>{fmt(avail)}</Mono>
                </RowBetween>
                <div style={{height:4,background:T.surface2,borderRadius:99,overflow:"hidden"}}>
                  <div style={{height:"100%",width:`${p}%`,background:card.color,borderRadius:99,opacity:.85,transition:"width .4s"}}/>
                </div>
                <RowBetween style={{marginTop:3}}>
                  <span style={{fontSize:".68rem",color:T.muted}}>Usado: {fmt(spent)}</span>
                  <span style={{fontSize:".68rem",color:T.muted}}>Inicial: {fmt(init)}</span>
                </RowBetween>
              </div>
            );
          })}
        </Card>
      )}

      {pending.length>0 && (
        <Card>
          <Label style={{marginBottom:10}}>PENDÊNCIAS ({pending.length})</Label>
          {pending.slice(0,6).map(e=>{
            const card = e.cardId?state.cards.find(c=>c.id===e.cardId):null;
            return (
              <div key={e.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",paddingBottom:9,marginBottom:9,borderBottom:`1px solid ${T.dim}`}}>
                <div>
                  <div style={{fontSize:".9rem",color:T.text}}>{e.name}</div>
                  <div style={{fontSize:".72rem",color:T.muted,marginTop:1,display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
                    <span>{e.category}</span>
                    {e.dueDay&&<span>· dia {e.dueDay}</span>}
                    {card&&<span style={{display:"flex",alignItems:"center",gap:3}}><span style={{width:6,height:6,display:"inline-block",borderRadius:1,background:card.color,flexShrink:0}}/>{card.name}</span>}
                  </div>
                </div>
                <Mono style={{color:T.negative,fontSize:".9rem",flexShrink:0,marginLeft:8}}>{fmt(e.amount)}</Mono>
              </div>
            );
          })}
          {pending.length>6&&<div style={{textAlign:"center",fontSize:".78rem",color:T.muted}}>+{pending.length-6} mais...</div>}
        </Card>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════
// INCOME VIEW
// ═══════════════════════════════════════════════════════
function IncomeView({income,C,onAdd,onEdit}) {
  return (
    <div>
      <SectionHeader title="Receitas" sub={`Total: ${fmt(C.totalIncome)}`} onAdd={onAdd}/>
      {income.length===0 ? <Empty text="Nenhuma receita cadastrada"/> :
        income.map(item=>(
          <div key={item.id} onClick={()=>onEdit(item)} style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:12,padding:"1rem",marginBottom:".7rem",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div>
              <div style={{fontSize:".95rem",fontWeight:500}}>{item.name}</div>
              {item.desc&&<div style={{fontSize:".78rem",color:T.muted,marginTop:2}}>{item.desc}</div>}
            </div>
            <Mono style={{color:T.positive,fontSize:"1rem"}}>{fmt(item.amount)}</Mono>
          </div>
        ))
      }
    </div>
  );
}

// ═══════════════════════════════════════════════════════
// CARDS VIEW
// ═══════════════════════════════════════════════════════
function CardsView({cards,mo,C,onAddCard,onEditCard,onSetBal}) {
  return (
    <div>
      <SectionHeader title="Cartões" sub={`${cards.length} cartão${cards.length!==1?"s":""} cadastrado${cards.length!==1?"s":""}`} onAdd={onAddCard}/>
      {cards.length===0 ? <Empty text="Nenhum cartão cadastrado"/> :
        cards.map(card=>{
          const init  = mo.cardBalances[card.id]!==undefined?+mo.cardBalances[card.id]:0;
          const avail = C.cardBals[card.id];
          const spent = init-avail;
          return (
            <div key={card.id} style={{background:T.surface,border:`1px solid ${card.color}33`,borderLeft:`3px solid ${card.color}`,borderRadius:12,padding:"1rem",marginBottom:".75rem"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
                <div>
                  <div style={{fontSize:"1rem",fontWeight:600}}>{card.name}</div>
                  {card.lastDigits&&<div style={{fontSize:".72rem",color:T.muted,marginTop:1}}>**** {card.lastDigits}</div>}
                </div>
                <button onClick={()=>onEditCard(card)} style={{background:T.surface2,border:`1px solid ${T.border}`,color:T.muted,borderRadius:7,padding:".3rem .7rem",cursor:"pointer",fontSize:".78rem",fontWeight:600}}>Editar</button>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:".5rem",marginBottom:12}}>
                {[["INICIAL",fmt(init),T.text],["USADO",fmt(spent),T.negative],["DISPONÍVEL",fmt(avail),avail>=0?T.positive:T.negative]].map(([l,v,c])=>(
                  <div key={l} style={{textAlign:"center",background:T.surface2,borderRadius:8,padding:".5rem .25rem"}}>
                    <div style={{fontSize:".6rem",color:T.muted,fontWeight:700,textTransform:"uppercase",letterSpacing:".04em",marginBottom:4}}>{l}</div>
                    <Mono style={{fontSize:".78rem",color:c,fontWeight:600}}>{v}</Mono>
                  </div>
                ))}
              </div>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontSize:".75rem",color:T.muted,flexShrink:0}}>Saldo inicial:</span>
                <input type="number" value={init} onChange={e=>onSetBal(card.id,e.target.value)} style={{...iS,flex:1,padding:".4rem .65rem",fontSize:".85rem",fontFamily:"'JetBrains Mono',monospace"}} onClick={e=>e.stopPropagation()}/>
              </div>
            </div>
          );
        })
      }
    </div>
  );
}

// ═══════════════════════════════════════════════════════
// EXPENSES VIEW
// ═══════════════════════════════════════════════════════
function ExpensesView({expenses,cards,C,onAdd,onEdit,onToggle,hasPrev,onCopy}) {
  const [filter,setFilter] = useState("all");
  const filters = [["all","Todas"],["fixed","Fixas"],["variable","Variáveis"],["paid","Pagas"],["unpaid","Pendentes"]];

  const filtered = expenses.filter(e=>{
    if(filter==="fixed")    return e.type==="fixed";
    if(filter==="variable") return e.type==="variable";
    if(filter==="paid")     return e.paid;
    if(filter==="unpaid")   return !e.paid;
    return true;
  }).sort((a,b)=>(a.dueDay||99)-(b.dueDay||99));

  const noFixed = expenses.filter(e=>e.type==="fixed").length===0;

  return (
    <div>
      <SectionHeader title="Despesas" sub={`${fmt(C.totalExpenses)} total · ${fmt(C.unpaidAmt)} pendente`} onAdd={onAdd}/>

      {hasPrev&&noFixed&&(
        <div style={{background:"#6366f110",border:"1px solid #6366f130",borderRadius:10,padding:".75rem 1rem",marginBottom:".75rem",display:"flex",alignItems:"center",justifyContent:"space-between",gap:8}}>
          <span style={{fontSize:".83rem",color:"#a5b4fc"}}>Copiar despesas fixas do mês anterior?</span>
          <button onClick={onCopy} style={{background:"#6366f1",color:"#fff",border:"none",borderRadius:7,padding:".35rem .9rem",cursor:"pointer",fontSize:".8rem",fontWeight:700,whiteSpace:"nowrap"}}>Copiar</button>
        </div>
      )}

      <div style={{display:"flex",gap:6,marginBottom:"1rem",overflowX:"auto",paddingBottom:2}}>
        {filters.map(([v,l])=>(
          <button key={v} onClick={()=>setFilter(v)} style={{padding:".32rem .85rem",borderRadius:99,border:"none",cursor:"pointer",fontSize:".78rem",fontWeight:700,whiteSpace:"nowrap",background:filter===v?T.accent:T.surface2,color:filter===v?T.bg:T.muted,transition:"background .15s,color .15s"}}>{l}</button>
        ))}
      </div>

      {filtered.length===0 ? <Empty text="Nenhuma despesa nesse filtro"/> :
        filtered.map(exp=>{
          const card = exp.cardId?cards.find(c=>c.id===exp.cardId):null;
          return (
            <div key={exp.id} style={{background:T.surface,border:`1px solid ${exp.paid?T.dim:T.border}`,borderRadius:12,padding:".8rem .9rem",marginBottom:".6rem",display:"flex",alignItems:"center",gap:".7rem",opacity:exp.paid?0.72:1,transition:"opacity .2s"}}>
              <button onClick={()=>onToggle(exp.id)} style={{width:22,height:22,borderRadius:6,border:`2px solid ${exp.paid?T.positive:T.border}`,background:exp.paid?T.positive+"22":"transparent",color:T.positive,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:".72rem",flexShrink:0,transition:"border-color .15s,background .15s"}}>
                {exp.paid?"✓":""}
              </button>
              <div style={{flex:1,minWidth:0,cursor:"pointer"}} onClick={()=>onEdit(exp)}>
                <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap",marginBottom:3}}>
                  <span style={{fontSize:".93rem",fontWeight:500,color:exp.paid?T.muted:T.text,textDecoration:exp.paid?"line-through":"none"}}>{exp.name}</span>
                  <Badge label={exp.type==="fixed"?"FIXA":"VAR"} color={exp.type==="fixed"?"#a5b4fc":"#fbbf24"} bg={exp.type==="fixed"?"#6366f120":"#f59e0b20"}/>
                </div>
                <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                  <span style={{fontSize:".72rem",color:T.muted}}>{exp.category}</span>
                  {exp.dueDay&&<span style={{fontSize:".72rem",color:T.muted}}>· dia {exp.dueDay}</span>}
                  {card&&<span style={{display:"flex",alignItems:"center",gap:3}}><span style={{width:7,height:7,display:"inline-block",borderRadius:1,background:card.color,flexShrink:0}}/><span style={{fontSize:".72rem",color:T.muted}}>{card.name}</span></span>}
                </div>
              </div>
              <Mono style={{color:exp.paid?T.muted:T.negative,fontSize:".92rem",flexShrink:0}}>{fmt(exp.amount)}</Mono>
            </div>
          );
        })
      }
    </div>
  );
}

// ═══════════════════════════════════════════════════════
// MODALS
// ═══════════════════════════════════════════════════════
function IncomeModal({onClose,onSave,init,onDel}) {
  const [name,setName] = useState(init?.name||"");
  const [amt,setAmt]   = useState(init?.amount||"");
  const [desc,setDesc] = useState(init?.desc||"");
  const go = () => { if(!name.trim()||!amt) return; onSave({name:name.trim(),amount:+amt,desc:desc.trim()}); };
  return (
    <Modal title={init?"Editar Receita":"Nova Receita"} onClose={onClose}>
      <Field label="Nome"><input style={iS} value={name} onChange={e=>setName(e.target.value)} placeholder="Ex: Salário, Freela..."/></Field>
      <Field label="Valor (R$)"><input style={iS} type="number" value={amt} onChange={e=>setAmt(e.target.value)} placeholder="0,00"/></Field>
      <Field label="Descrição (opcional)"><input style={iS} value={desc} onChange={e=>setDesc(e.target.value)} placeholder="Observações..."/></Field>
      <button style={btnP} onClick={go}>Salvar</button>
      {onDel&&<button style={btnD} onClick={onDel}>Excluir Receita</button>}
    </Modal>
  );
}

function CardModal({onClose,onSave,init,onDel}) {
  const [name,setName]   = useState(init?.name||"");
  const [color,setColor] = useState(init?.color||CARD_COLORS[0]);
  const [last,setLast]   = useState(init?.lastDigits||"");
  const go = () => { if(!name.trim()) return; onSave({name:name.trim(),color,lastDigits:last.trim()}); };
  return (
    <Modal title={init?"Editar Cartão":"Novo Cartão"} onClose={onClose}>
      <Field label="Nome do Cartão"><input style={iS} value={name} onChange={e=>setName(e.target.value)} placeholder="Ex: Nubank, Itaú..."/></Field>
      <Field label="Últimos 4 dígitos (opcional)"><input style={iS} value={last} onChange={e=>setLast(e.target.value)} maxLength={4} placeholder="1234"/></Field>
      <Field label="Cor do Cartão">
        <div style={{display:"flex",gap:8,flexWrap:"wrap",marginTop:4}}>
          {CARD_COLORS.map(c=>(
            <button key={c} onClick={()=>setColor(c)} style={{width:28,height:28,borderRadius:7,background:c,border:`3px solid ${color===c?"#fff":"transparent"}`,cursor:"pointer",outline:"none",transition:"border-color .15s"}}/>
          ))}
        </div>
      </Field>
      <button style={btnP} onClick={go}>Salvar</button>
      {onDel&&<button style={btnD} onClick={onDel}>Excluir Cartão</button>}
    </Modal>
  );
}

function ExpenseModal({onClose,onSave,init,onDel,cards}) {
  const [name,setName]     = useState(init?.name||"");
  const [amt,setAmt]       = useState(init?.amount||"");
  const [cat,setCat]       = useState(init?.category||CATEGORIES[0]);
  const [type,setType]     = useState(init?.type||"fixed");
  const [cardId,setCardId] = useState(init?.cardId||"");
  const [due,setDue]       = useState(init?.dueDay||"");
  const go = () => { if(!name.trim()||!amt) return; onSave({name:name.trim(),amount:+amt,category:cat,type,cardId:cardId||null,dueDay:due?+due:null}); };
  return (
    <Modal title={init?"Editar Despesa":"Nova Despesa"} onClose={onClose}>
      <Field label="Nome"><input style={iS} value={name} onChange={e=>setName(e.target.value)} placeholder="Ex: Aluguel, Netflix..."/></Field>
      <Field label="Valor (R$)"><input style={iS} type="number" value={amt} onChange={e=>setAmt(e.target.value)} placeholder="0,00"/></Field>
      <Field label="Categoria">
        <select style={{...iS}} value={cat} onChange={e=>setCat(e.target.value)}>
          {CATEGORIES.map(c=><option key={c} value={c}>{c}</option>)}
        </select>
      </Field>
      <Field label="Tipo">
        <div style={{display:"flex",gap:8}}>
          {[["fixed","📌 Fixa","#6366f1"],["variable","🎲 Variável","#f59e0b"]].map(([v,l,c])=>(
            <button key={v} onClick={()=>setType(v)} style={{flex:1,padding:".55rem",borderRadius:8,border:"none",cursor:"pointer",fontWeight:700,fontSize:".88rem",background:type===v?c:T.surface2,color:type===v?"#fff":T.muted,transition:"background .15s"}}>{l}</button>
          ))}
        </div>
      </Field>
      <Field label="Pagar com Cartão">
        <select style={{...iS}} value={cardId} onChange={e=>setCardId(e.target.value)}>
          <option value="">Sem cartão (dinheiro / pix)</option>
          {cards.map(c=><option key={c.id} value={c.id}>{c.name}{c.lastDigits?` ****${c.lastDigits}`:""}</option>)}
        </select>
      </Field>
      <Field label="Dia de Vencimento (opcional)">
        <input style={iS} type="number" value={due} onChange={e=>setDue(e.target.value)} placeholder="Ex: 10, 15, 25..." min="1" max="31"/>
      </Field>
      <button style={btnP} onClick={go}>Salvar</button>
      {onDel&&<button style={btnD} onClick={onDel}>Excluir Despesa</button>}
    </Modal>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
